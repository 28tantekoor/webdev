<!DOCTYPE html>
<html>

<head>
    <title>Cosmic Scoop: Contact</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="contactPage">
        <header class="header">
            <h1>Contact</h1>
            <img id="heroimage" src="images/download.jpg" alt="Ice cream scoops">
        </header>

        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="contact.html">Contact</a>
            <a href="services.html">Services</a>
        </nav>

        <main class="main">
            <h2>Contact</h2>
            <p>
                Maya Starling is our customer service manager. She is happy to help
                with ice cream questions, party orders, catering requests, and flavor
                emergencies.
            </p>
            <img id="manager" src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=700&q=80" alt="Customer Service Manager Maya Starling">

            <form>
                <label for="email">Email</label>
                <input id="email" name="email" type="email">

                <label for="name">Name</label>
                <input id="name" name="name" type="text">

                <label for="comments">Comments</label>
                <textarea id="comments" name="comments" rows="4"></textarea>

                <input id="submit" type="submit" value="Submit">
            </form>
        </main>

        <footer>
            <p>Copyright 2026 - Cosmic Scoop LLC</p>
        </footer>
    </div>
</body>

</html>
